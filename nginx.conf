server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip helps even though pages are tiny.
    gzip on;
    gzip_types text/css application/javascript image/svg+xml;
    gzip_min_length 256;

    # Astro builds clean URLs; resolve /post -> /post/index.html etc.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Fingerprinted assets can be cached forever.
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /favicon.svg {
        expires 7d;
    }
}
