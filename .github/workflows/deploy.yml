name: Build & Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase; the repo owner has capitals.
      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on droplet over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_SSH_PORT || '22' }}
          envs: IMAGE,GHCR_PAT,ACTOR
          script: |
            set -e
            echo "$GHCR_PAT" | docker login ghcr.io -u "$ACTOR" --password-stdin
            docker pull "$IMAGE:latest"
            docker stop blog 2>/dev/null || true
            docker rm blog 2>/dev/null || true
            docker run -d --name blog --restart unless-stopped \
              -p 80:80 "$IMAGE:latest"
            docker image prune -f
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          ACTOR: ${{ github.actor }}
